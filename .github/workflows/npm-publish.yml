name: Build and deploy to npm

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "true"
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'master'
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Extract version
        id: extract_version
        uses: Saionaro/extract-package-version@v1.0.6
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm publish
      - run: npm run build-s3
      - name: publish to CDN (s3)
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read
        env:
          SOURCE_DIR: './dist'
          DEST_DIR: 'plugin-interface/${{ steps.extract_version.outputs.version }}'
          AWS_REGION: 'us-east-1'
          AWS_S3_BUCKET: ${{ secrets.DEPLOY_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DEPLOY_API_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DEPLOY_SECRET }}
